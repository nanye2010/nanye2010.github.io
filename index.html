        // ===== 核心文件处理函数（兼容 .dat 和 .txt）=====
        async function processFile(file) {
            currentFile = file;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            resultArea.style.display = 'none';
            
            try {
                let text;
                if (file.name.endsWith('.dat')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const uint8Array = new Uint8Array(arrayBuffer);
                    text = ml(uint8Array);
                } else {
                    text = await file.text();
                }
                
                const cleanText = text.replace(/&#34;/g, '"').replace(/&#39;/g, "'");
                let parsedData;
                try {
                    parsedData = JSON.parse(cleanText);
                } catch (e) {
                    throw new Error('文件格式不正确，无法解析为JSON。');
                }
                
                const enemyList = parsedData?.playerData?.EnemyJournalKillData?.list;
                if (!enemyList || !Array.isArray(enemyList)) {

                for (let item of mappingList) {

                }

                    const data = wikiData[chineseName];
                    const officialEnglish = data.english.trim();
                    gameNameToInfo[officialEnglish] = {
                        chineseName: chineseName,
                        requirement: data.requirement
                    };
                }

                // 筛选出未解锁的怪物
                const unlockedMonsters = [];
                for (let enemy of enemyList) {
                    const saveId = enemy.Name;
                    const kills = enemy.Record?.Kills || 0;
                    const officialName = idToGameName[saveId];
                    if (!officialName) continue;
                    const info = gameNameToInfo[officialName];
                    if (!info) continue;
                    const remaining = info.requirement - kills;
                    if (remaining > 0) {
                        unlockedMonsters.push({
                            固定编号: wikiIndexMap[info.chineseName],
                            中文名: info.chineseName,
                            官方英文: officialName,
                            存档英文: saveId,
                            当前击杀: kills,
                            所需击杀: info.requirement,
                            还差: remaining
                        });
                    }
                }
                
                unlockedMonsters.sort((a, b) => a.固定编号 - b.固定编号);
                currentResult = unlockedMonsters;
                lastModifiedTime = file.lastModified;
                updateFileInfoDisplay(file.name, file.lastModified);

                if (currentResult.length === 0) {
                    showError('恭喜！所有怪物均已解锁。');
                } else {
                    displayResult(currentResult);
                }

            } catch (e) {
                showError('处理文件时出错：' + e.message);
                console.error(e);
            } finally {
                loading.style.display = 'none';
            }
        }

        // ===== 显示结果 =====
        function displayResult(result) {
            stats.innerHTML = `共找到 <strong>${result.length}</strong> 个未解锁怪物`;
            resultBody.innerHTML = '';
            for (let r of result) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${r.固定编号}</td>
                    <td>${r.中文名}</td>
                    <td>${r.官方英文}</td>
                    <td><code>${r.存档英文}</code></td>
                    <td>${r.当前击杀}</td>
                    <td>${r.所需击杀}</td>
                    <td style="color:#e74c3c; font-weight:bold;">${r.还差}</td>
                `;
                resultBody.appendChild(row);
            }
            resultArea.style.display = 'block';
        }

        // ===== 显示错误 =====
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // ===== 下载结果 =====
        downloadBtn.addEventListener('click', () => {
            if (currentResult.length === 0) return;
            let content = '固定编号\t中文名\t官方英文名\t存档英文ID\t当前击杀\t所需击杀\t还差\n';
            for (let r of currentResult) {
                content += `${r.固定编号}\t${r.中文名}\t${r.官方英文}\t${r.存档英文}\t${r.当前击杀}\t${r.所需击杀}\t${r.还差}\n`;
            }
            const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '未解锁怪物列表.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        // ===== 自动刷新核心功能 =====
        function initializeAutoRefreshUI() {
            const isModernBrowser = 'showOpenFilePicker' in window;
            let controlsHTML = '';

            if (isModernBrowser) {
                controlsHTML = `
                    <div class="divider"><span>或</span></div>
                    <div class="hint-box info">
                        <strong>✨ 自动刷新功能</strong><br>
                        点击下方按钮选择存档文件，工具将每隔10秒自动检查更新。<br>
                        <small>游戏坐椅子保存后，数据会自动刷新。</small>
                    </div>
                    <button class="control-btn" id="pickFileBtn">📁 选择存档文件并开启监控</button>
                    <button class="control-btn stop" id="stopRefreshBtn" style="display:none;">⏸️ 停止自动刷新</button>
                `;
            } else {
                controlsHTML = `
                    <div class="divider"><span>浏览器限制</span></div>
                    <div class="hint-box warning">
                        <strong>⚠️ 自动刷新不可用</strong><br>
                        当前浏览器不支持此功能（Chrome 86+、Edge 90+ 支持）。<br>
                        <small>您仍可拖拽文件分析，但存档更新后需要手动重新拖入。</small>
                    </div>
                `;
            }
            autoRefreshControls.innerHTML = controlsHTML;

            // 为现代浏览器绑定按钮事件
            if (isModernBrowser) {
                bindAutoRefreshEvents();
            }
        }

        function bindAutoRefreshEvents() {
            const pickBtn = document.getElementById('pickFileBtn');
            const stopBtn = document.getElementById('stopRefreshBtn');
            
            if (!pickBtn || !stopBtn) {
                console.warn('自动刷新按钮未找到，稍后重试...');
                setTimeout(bindAutoRefreshEvents, 100);
                return;
            }

            // 移除可能存在的旧监听器（防止重复绑定）
            pickBtn.replaceWith(pickBtn.cloneNode(true));
            stopBtn.replaceWith(stopBtn.cloneNode(true));
            
            // 重新获取元素引用
            const newPickBtn = document.getElementById('pickFileBtn');
            const newStopBtn = document.getElementById('stopRefreshBtn');

            // 绑定“选择文件”按钮事件
            newPickBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                try {
                    [fileHandle] = await window.showOpenFilePicker({
                        types: [{
                            description: '丝之歌存档文件',
                            accept: { 'application/octet-stream': ['.dat'] }
                        }],
                        multiple: false
                    });
                    await startAutoRefresh();
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showError('无法访问文件：' + err.message);
                    }
                }
            });

            // 绑定“停止监控”按钮事件
            newStopBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                stopAutoRefresh();
                showError('自动刷新已停止。');
            });
        }

        async function startAutoRefresh() {
            if (!fileHandle) return;
            
            try {
                const file = await fileHandle.getFile();
                await processFile(file);
                
                // 显示停止按钮，隐藏开始按钮
                document.getElementById('pickFileBtn').style.display = 'none';
                document.getElementById('stopRefreshBtn').style.display = 'inline-block';

                // 启动轮询检查
                refreshTimer = setInterval(async () => {
                    if (document.visibilityState === 'visible') {
                        await checkForUpdates();
                    }
                }, 10000);
                
                console.log('自动刷新已启动，每10秒检查一次。');

            } catch (err) {
                console.error('启动自动刷新失败:', err);
                showError('启动监控失败：' + err.message);
                stopAutoRefresh();
            }
        }

        async function checkForUpdates() {
            if (!fileHandle) return;
            
            try {
                const newFile = await fileHandle.getFile();
                if (newFile.lastModified > lastModifiedTime) {
                    console.log('检测到存档更新，自动刷新数据...');
                    lastModifiedTime = newFile.lastModified;
                    await processFile(newFile);
                    
                    // 显示更新提示
                    const statsEl = document.getElementById('stats');
                    if (statsEl) {
                        const originalHtml = statsEl.innerHTML;
                        statsEl.innerHTML = originalHtml + ' <span style="color:#27ae60;">(已更新)</span>';
                        setTimeout(() => statsEl.innerHTML = originalHtml, 2000);
                    }
                }
            } catch (err) {
                console.error('检查文件更新失败:', err);
                showError('自动刷新失败，请重新选择文件。');
                stopAutoRefresh();
            }
        }

        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
            fileHandle = null;
            const pickBtn = document.getElementById('pickFileBtn');
            const stopBtn = document.getElementById('stopRefreshBtn');
            if (pickBtn) pickBtn.style.display = 'inline-block';
            if (stopBtn) stopBtn.style.display = 'none';
            updateFileInfoDisplay('', 0);
        }

        function updateFileInfoDisplay(fileName, lastModified) {
            if (!fileInfoEl) return;
            
            if (fileName && lastModified) {
                const timeStr = new Date(lastModified).toLocaleTimeString();
                fileInfoEl.innerHTML = `🔍 监控中: <strong>${fileName}</strong> (最后修改: ${timeStr})`;
                fileInfoEl.style.color = '#27ae60';
            } else {
                fileInfoEl.innerHTML = '📋 未监控任何文件';
                fileInfoEl.style.color = '#7f8c8d';
            }
        }

        // ===== 页面初始化 =====
        window.addEventListener('DOMContentLoaded', () => {
            initializeAutoRefreshUI();
            
            // 拖拽区域点击事件
            dropZone.addEventListener('click', (e) => {
                if (e.target.closest('.controls')) return;
                fileInput.click();
            });
            
            // 拖拽事件
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    stopAutoRefresh();
                    processFile(file);
                }
            });
            
            // 文件选择事件
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    stopAutoRefresh();
                    processFile(file);
                }
            });
        });
    </script>
</body>
</html>
